  <!-- The "T": a top bar + a centred stem -->
  <rect x="30" y="38" width="68" height="14" rx="2" fill="#f8f8f4" />
  <rect x="57" y="38" width="14" height="54" rx="2" fill="#f8f8f4" />
</svg>
